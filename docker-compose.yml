services:
  timenet-flow-control:
    build: .
    container_name: timenet-flow-control-config
    ports:
      - "3002:3000"
    volumes:
      - flow-control-data:/data
    environment:
      - PORT=3000
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=admin@111
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/rates.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  flow-control-data:
