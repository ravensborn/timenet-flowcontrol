services:
  timenet-flow-control:
    build: .
    container_name: timenet-flow-control-config
    volumes:
      - flow-control:/data
    environment:
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/rates.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  flow-data:
